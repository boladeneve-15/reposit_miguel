<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="CSS fudido de bom.css" />
  </head>
  <body>
    <h2 id="suaLista"></h2>
    <details>
      <summary>clirar lista</summary>
      <input type="number" id="insirir" />
      <button onclick="AplicarNoFinal()">aplicar lista</button>
      <button onclick="RetirarNoFinal()" id="retirar">retirar lista</button>
    </details>

    <button onclick="maior()">Ver maior</button>
    <h2 id="resultadoMaior">resultado</h2>
    <button onclick="menor()">Ver menor</button>
    <h2 id="resultadoMenor">resultado</h2>
  </body>
  <script>
    lista = [];
    function AplicarNoFinal() {
        aplica = parseInt(insirir.value);
        lista.push(aplica);
        
        suaLista.innerHTML = "Lista: " + lista;
    }
    
    function RetirarNoFinal() {
        lista.pop();
        suaLista.innerHTML = "Lista: " + lista;
    }
    
    function maior() {
        maiorValor = -Number.MAX_SAFE_INTEGER;
        tamanhoDaLista = parseInt(lista.length);
        for (i = 0; i < tamanhoDaLista; i++) {
            if (maiorValor < lista[i]) {
                maiorValor = lista[i];
                maiorValor = maiorValor;
            }
        }
        resultadoMaior.innerHTML = maiorValor;
    }
    function menor() {
        menorValor = Number.MAX_SAFE_INTEGER;
        tamanhoDaLista = parseInt(lista.length);
      for (i = 0; i < tamanhoDaLista; i++) {
        if (menorValor > lista[i]) {
          menorValor = lista[i];
          menorValor = menorValor;
        }
      }
      resultadoMenor.innerHTML = menorValor;
    }
  </script>
</html>
