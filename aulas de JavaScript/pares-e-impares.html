  <body>
    <h2 id="suaLista"></h2>

      <button onclick="AplicarNoFinal()">aplicar lista</button>

  <script>
    lista = [];
    function AplicarNoFinal() {
      aplica = parseInt(insirir.value);
      lista.push(aplica);

      suaLista.innerHTML = "Lista: " + lista;
    }

    function RetirarNoFinal() {
      lista.pop();
      suaLista.innerHTML = "Lista: " + lista;
    }

         pontosImpar = 0

            VerSePar = lista[i] % 2
            if(VerSePar == 1){
                pontosImpar++
            console.log(lista[i])
            
        }
        pontosImpars.innerHTML = (pontosImpar)

    }
}
    function par() {

            if(VerSeimPar == 0){

        }

}
  </script>
