<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        button {
            width: 50px;
            height: 50px;
            margin: 10px;
        }

        input {
            width: 270px;
            height: 50px;
            margin: 10px;
        }

        #calculadora {
            background-color: black;
            width: 400px;
            height: 50 0px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: self-start;

        }
        .resultado {
            background-color: white;
           flex-direction: column;
            justify-content: center;
            align-items: self-start;
            display: flex;

        }
    </style>
</head>

<body>
    <div id="calculadora">
        <div class="botoes">
            <input type="number" id="display" class="resultado">
            <br>
            <button onclick="input.value += '1'">1</button>
            <button onclick="input.value += '2'">2</button>
            <button onclick="input.value += '3'">3</button>
            <button onclick="input.value += '-'" onclick="sinais()">-</button>
            <button onclick="input.value += '+'" onclick="sinais()">+</button>
            <br>
            <button onclick="input.value += '4'">4</button>
            <button onclick="input.value += '5'">5</button>
            <button onclick="input.value += '6'">6</button>
            <button onclick="input.value += '*'" onclick="sinais()">*</button>
            <button onclick="input.endsWith  += '/'" onclick="sinais()">/</button>
            <br>
            <button onclick="input.value += '7'">7</button>
            <button onclick="input.value += '8'">8</button>
            <button onclick="input.value += '9'" >9</button>


            <button onclick="calcular()">=</button>
            <button onclick="Limpar()">⌫</button>

        </div>

    </div>


</body>
<script>
const input = document.getElementById('display');
input.value = '123';
function Limpar() {
    display.value = display.value.slice(0, -1);
}
function calcular() {
    try {
        display.value = eval(display.value);
    } catch (error) {
        display.value = 'Erro';
    } }
    function sinais() {
        if (display.value.endsWith('+') || display.value.endsWith('-') || display.value.endsWith('*') || display.value.endsWith('/')) {
            display.value = display.value.slice(0, -1);
        } 

    }
</script>

</html>
