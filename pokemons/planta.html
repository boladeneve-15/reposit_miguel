<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: linear-gradient(135deg, #0fff1b, #00a30e);
    font-family: Arial, sans-serif;
    gap:20px;
    padding:20px;
}

#foto1{
    width: min(80vw, 260px);
    transition: transform .3s;
}

#foto1:hover{
    transform: scale(1.05);
}

.a{
    width: min(90vw, 320px);
    height: 60px;
    border:none;
    border-radius:20px;
    background:#0fff1b;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    box-shadow: 0 6px 15px rgba(0,0,0,.2);
}

.a:hover{
    background:#00a008;
    transform: translateY(-3px);
}

.a:active{
    transform: scale(.97);
}

.megas{
    display:flex;
    gap:20px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
}

img{
    width:70px;
    cursor:pointer;
    transition:.2s;
}

img:hover{
    transform: translateY(-5px) scale(1.05);
}

.bloqueado{
    opacity:.4;
    pointer-events:none;
    filter: grayscale(100%);
}

@media (min-width:768px){
    #foto1{
        width:320px;
    }

    .a{
        width:400px;
        height:70px;
        font-size:24px;
    }

    .megas img{
        width:90px;
    }
}
.B{
    width: 130px;
background-color: rgb(255, 255, 255);
color: rgb(0, 0, 0);
border: none;
border-radius: 15px;}
.B1:hover{
    width: 130px;
background-color: rgb(170, 170, 170);
color: rgb(0, 0, 0);
border: none;
border-radius: 15px;
transform: translateX(10px);}

.B2:hover{
    width: 130px;
background-color: rgb(170, 170, 170);
color: rgb(0, 0, 0);
border: none;
border-radius: 15px;
transform: translateX(-10px);}
.ba{
width: 130px;
background-color: #0fff1b;
color: rgb(0, 0, 0);
border: none;
border-radius: 15px;
}
.ba:hover{
width: 130px;
height: 21px;
background-color: #00a008;
color: rgb(0, 0, 0);
border: none;
border-radius: 15px;
}
.ba:focus{
width: 130px;
height: 21px;
background-color: rgb(0, 0, 0);
color: rgb(255, 255, 255);
border: none;
border-radius: 15px;
}

    </style>
</head>
<body>
    <h1>Pokemon de planta</h1>
   <img src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/001.png" id="foto1">

   <button class="a" onclick="A()"> LV1</button>

   <button class="a" onclick="B()"> LV16</button>

   <button class="a" onclick="C()"> LV 32</button>

   <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0RRHJNybwY44iL5MSlgiwTDOlAdbEwMiuZA&s" width="70px" id="mega" class="bloqueado" onclick="mega()">

<nav>
<a href="http://127.0.0.1:5500/pokemons/agua.html">
<button class="B B2"><</button></a>
<a href="">
<button class="ba" id="CC" onclick="E()"> ESCOLHER </button>
</a>
<a href="http://127.0.0.1:5500/pokemons/fogo.html">
<button class="B B1">></button></a>
</nav>

   
</body>
<script>
   function A(){
    foto1.src = 'https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/001.png';
    document.getElementById('mega').classList.add('bloqueado');
}

   function B(){
    document.getElementById('foto1').src = 'https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/002.png';
    document.getElementById('mega').classList.add('bloqueado');

   
}
   function C(){
    document.getElementById('foto1').src = 'https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/003.png';
    document.getElementById('mega').classList.remove('bloqueado');

    
}
   function mega(){
   
        document.getElementById('foto1').src= 'https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/003_f2.png';
   
    }
   
function E(){
      document.getElementById('CC').innerHTML= "ESCOLHIDO"
}

</script>
</html>
