<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS fudido de bom.css">
    <style>
        body{
        display: flex;
        flex-direction: column;
        align-items:center;
        justify-content:start;
        gap: 55px;
        margin: 25px;

        }
        .divpai{
               display: flex;
        flex-direction: column;
        align-items:center;
        justify-content:start;
        gap: 55px;
        margin: 25px;
        }
        div{  display: flex;
        flex-direction: row;
        align-items:center;
        justify-content:end;}
    </style>
</head>
<body>
    <div>
    <h1 id="suaLista"></h1>
</div>
     <div>
        <div class="divpai">
    <details>
        <summary>
            aplicar no final
        </summary>
        <input type="text" id="pullNoFim" placeholder="atividade de push">
        <button onclick="AplicarNoFinal()">aplicar</button>
        <h2 id="aplicarnofinal"></h2>
    </details>
    <details>
        <summary>
          tirar no final
        </summary>
        <button onclick="RetirarNoFinal()">aplicar</button>
        <h2 id="Tirarnofinal"></h2>
    </details>
    <details>
        <summary>
           tirar no começo
        </summary>

        <button onclick="TirarNoComeco()">aplicar</button>
        <h2 id="tirarNoComeco"></h2>
    </details>
    <details>
        <summary>
            aplicar no começo
        </summary>
        <input type="text" id="colocarNoComeco" placeholder="atividade de Unshift">
        <button onclick="aplicarNoComeco()">aplicar</button>
        <h2 id="colocarnocomeco"></h2>
    </details>
    </div>
    <div>
            <div class="divpai">    
    <details>
        <summary>
            onde vc quer trocar na lista
        </summary>
        <input type="text" id="FazTudoONDE" placeholder="escolher o elemento">
        <input type="text" id="FazTudoSubistituir" placeholder="oque vai subistituir">
        <button onclick="atividadel()">aplicar</button>
        <h2 id="trocas"></h2>
    </details>
    <details>
        <summary>
            deletar em qualquer possiçao
        </summary>
          <input type="text" id="FazTudoONDE1" placeholder="escolher o elemento">
        <button onclick="atividade2()">aplicar</button>
        <h2 id="deletar"></h2>
    </details>
    <details>
        <summary>
           insirir em qualquer possiçao 
        </summary>
         <input type="text" id="FazTudoONDE2" placeholder="escolher o elemento">
        <input type="text" id="possicaodeinsirir" placeholder="onde vai insirir">
        <button onclick="atividade3()">aplicar</button> 
        <h2 id="insirir"></h2>
    </details>
 </div>   
</div>

</body>
<script>
    
    lista = ["miguel", "almeida", "e?"]

    suaLista.innerHTML ="Lista: " +  lista
    // 1 onde a pessoa vai mexer na lista 
    // 2 quantos elementos vai remover
    // 3 oque vai ser inserido
    function atividadel(){
        Onde = parseInt(FazTudoONDE.value)
        trocar = FazTudoSubistituir.value
        lista.splice(Onde, 1, trocar);
       
        suaLista.innerHTML ="Lista: " +   lista
    }

    function atividade2(){
        Onde = parseInt(FazTudoONDE1.value)
        lista.splice(Onde, 1);
        
         suaLista.innerHTML ="Lista: " +   lista
    }
  function atividade3(){
        Onde = parseInt(FazTudoONDE2.value)
       inserir = possicaodeinsirir.value
        lista.splice(Onde, 0, inserir);
        
         suaLista.innerHTML ="Lista: " +   lista
    }

   function AplicarNoFinal(){
        aplica = pullNoFim.value
        lista.push(aplica)
    
    suaLista.innerHTML ="Lista: " +   lista
    }

    function RetirarNoFinal(){
        lista.pop()
        
        suaLista.innerHTML ="Lista: " +   lista
    }

    function TirarNoComeco(){
        lista.shift()
      
       suaLista.innerHTML ="Lista: " +   lista
    }

    function aplicarNoComeco(){
         aplica = colocarNoComeco.value
        lista.unshift(aplica)
        
        suaLista.innerHTML ="Lista: " +   lista
    }
</script>
</html>
