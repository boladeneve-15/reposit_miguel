<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="aulaNormal.css">
</head>
<body>
    <h2>tamanho da string</h2>
    <input type="text" id="Digi">
    
    <Button onclick="R()"></Button>
    <h1 id="RR"></h1>



<h2>tudo pra maiusculo</h2>
    <input type="text" id="MAI">
    
    <Button onclick="MAIUCUSLO()"></Button>
    <h1 id="mm"></h1>

<h2>slice meio pequenho meio grande</h2>
    <input type="text" id="PG">
    
    <Button onclick="replaceA()"></Button>
    <h1 id="pg"></h1>

</body>
<script>
    function R(){
        A = Digi.value
rr = A.length;
 RR.innerHTML = rr
    }

    function MAIUCUSLO(){
 B = MAI.value
 ff = B.toUpperCase()
 mm.innerHTML = ff
    }
    function replaceA(){
        s = PG.value
        ss = s.replace( "legal" , "ruim")
            pg.innerHTML = ss
        
    }

</script>
