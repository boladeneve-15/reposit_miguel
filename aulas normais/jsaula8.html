<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS fudido de bom.css  ">
</head>
<style>
    body{ display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;}
   
</style>
<body>
    <h2>tamanho da string</h2>
    <input type="text" id="Digi">
    
    <Button onclick="R()">Resultado</Button>
    <h1 id="RR"></h1>



<h2>tudo pra maiusculo</h2>
    <input type="text" id="MAI">
    
    <Button onclick="MAIUCUSLO()">Resultado </Button>
    <h1 id="mm"></h1>

<h2>digite um texto falando que o davi e hetero</h2>
    <input type="text" id="PG">
    
    <Button onclick="replaceA()">Resultado</Button>
    <h1 id="pg"></h1>

<h2>letras + numero = letras final, sem numero</h2>
<input type="text" id="nome" placeholder="nome">
<input type="text" id="numero" placeholder="nuemro de letras cortada">
<button onclick="cut()"></button>
<h1 id="RE"></h1>

</body>
<script>
    function R(){
        A = Digi.value
rr = A.length;
 RR.innerHTML = rr
    }

    function MAIUCUSLO(){
 B = MAI.value
 ff = B.toLowerCase()
 mm.innerHTML = ff
    }
    function replaceA(){
        s = PG.value
        ss = s.replace( "hetero" , "gay")
            pg.innerHTML = ss
        
    }
    function cortar(){
NOME = nome.value
NUMERO = numero.value
N = (NOME.slice(-NUMERO))
RE.innerHTML = N
    }

    function cut(){
        n = nome.value
        nu = numero.value

        posicaoCorte = n.length - nu

        sub = n.slice(posicaoCorte, nu)

        RE.innerHTML = sub
    }

</script>
</html>
