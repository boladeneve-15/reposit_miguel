<body>
<input type="time" id="tempo">
<button onclick="fazer()"></button>    
<h2 id="aidi"></h2>
</body>
<script>
    function fazer(){
// Tempo = parseInt(tempo.value)
 T =tempo.value
horas = T.slice("0","2")
horasDaManha = parseInt(horas)
if(horasDaManha <=  12){
aidi.innerHTML = "madrugada ou cedo"
}
else if(horasDaManha >= 13){
    aidi.innerHTML = "tarde ou noite"
}

    }
