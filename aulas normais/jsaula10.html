<div>
    <h2>escolha o horario</h2>
    <input type="date" id="date">
    <button onclick=" ATIVI1()">Resultado</button>
    <h2 id="apare"></h2>
</div>
<div>
    <h2>atividade2</h2>
    <input type="text" id="ativi2">
    <button onclick="ATIVI3()">Resultado</button>
    <h2 id="apare2"></h2>
    <!-- atividade 2 e pra fazer um 1.9,8,1,.,., virar um 1,981 -->
</div>
</body>
<script>
   function ATIVI2(){
    vir = ativi2.value
    vir = vir.replaceAll(".", ",").replace(",",".").replaceAll(",","").replace(".",",")
    apare2.innerHTML = vir

   }
   function ATIVI3(){
    vir = ativi2.value
    vir = vir.replaceAll(".", ",")

    p = vir.indexOf(',')

    vir = vir.slice(0, p+1) + vir.slice(p+1).replaceAll(',', '') 
    apare2.innerHTML = vir

   }

Mes = data.slice( 4 , 7)
