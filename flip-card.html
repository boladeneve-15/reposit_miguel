    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      #barra {
        width: 100%;
        height: 50px;
        background-color: rgb(230, 111, 111);
        width: 100%;
        margin-bottom: 30px;
        align-items: center;
        justify-content: center;
        display: flex;
      }

      .banner {
        width: 100%;
        height: 250px;
        overflow: hidden;
      }
      input[type="text"] {
        width: 350px;
        padding: 5px;
        margin: 10px;
        border: 0px;
        border-radius: 4px;
        background-color: rgb(230, 111, 111);
      }
      #txtBusca {
        float: left;
        background-color: white;
        padding-left: 5px;
        font-style: italic;
        font-size: 18px;
        height: 32px;
        width: 260px;
      }
      .slides {
        display: flex;
        width: 400%;
        height: 100%;
        animation: slide 12s infinite;
      }
      .slides img {
        width: 100%;
        height: 100%;
        object-fit: cover;
       
      }
      .slides a {
        width: 25%;
        height: 100%;
       display: block;
       
      }


      @keyframes slide {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-25%);
        }
        45% {
          transform: translateX(-25%);
        }
        50% {
          transform: translateX(-50%);
        }
        70% {
          transform: translateX(-50%);
        }
        75% {
          transform: translateX(-75%);
        }
        100% {
          transform: translateX(-75%);
        }
      }
    </style>

    </div>
