<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
        }

.card{
display: flex;
  flex-direction: column;
  align-items: center;
  width: 300px;
  min-height: 400px;
  padding: 20px;
  border-radius: 24px;
  background: rgb(128, 128, 128);
  text-decoration: none;
  color: black;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  transition: transform 0.2s, box-shadow 0.2s;
  padding-left: 2px;
  margin-bottom: 20px;
  margin-top: 10px;

}
.card:checked{
display: flex;
  flex-direction: column;
  align-items: center;
  width: 300px;
  min-height: 400px;
  padding: 20px;
  border-radius: 24px;
  background: rgb(0, 0, 0);
  text-decoration: none;
  color: black;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  transition: transform 0.2s, box-shadow 0.2s;
  padding-left: 2px;
  margin-bottom: 20px;
  margin-top: 10px;




}



    </style>
</head>
<body>

    <div> 
        
     <div class="card"> 


<input type="button">


      </div>
  
</div>



    
</body>
</html>
