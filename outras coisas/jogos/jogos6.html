<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Neon Snake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            letter-spacing: 2px;
        }

        #scoreboard {
            display: flex;
            gap: 40px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #score { color: #00f2fe; text-shadow: 0 0 5px #00f2fe; }
        #highscore { color: #4facfe; text-shadow: 0 0 5px #4facfe; }

        #game-container {
            position: relative;
            border: 4px solid #00f2fe;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5), inset 0 0 15px rgba(0, 242, 254, 0.3);
            background-color: rgba(5, 5, 15, 0.9);
        }

        canvas {
            display: block;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 27, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        #game-over-screen h2 {
            color: #ff0844;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff0844;
        }

        #btn-restart {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>SNAKE NEON</h1>

    <div id="scoreboard">
        <div>Pontos: <span id="score">0</span></div>
        <div>Recorde: <span id="highscore">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="game-over-screen">
            <h2>FIM DE JOGO</h2>
            <button id="btn-restart">Jogar Novamente</button>
        </div>
    </div>

    <div class="instructions">
        Use as setas do teclado (← ↑ → ↓) ou WASD para guiar a cobrinha.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highscoreElement = document.getElementById("highscore");
        const gameOverScreen = document.getElementById("game-over-screen");
        const restartBtn = document.getElementById("btn-restart");

        // Configurações do Grid
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Estado do Jogo
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Velocidade X
        let dy = 0;        // Velocidade Y
        let score = 0;
        let highscore = localStorage.getItem("snakeHighScore") || 0;
        let gameInterval;
        let gameRunning = false;

        highscoreElement.innerText = highscore;

        // Inicializa/Reseta o jogo
        function initGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            generateFood();
            gameOverScreen.style.display = "none";
            gameRunning = true;
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 100); // 100ms = velocidade estável e divertida
        }

        // Loop principal
        function update() {
            if (hasGameEnded()) {
                endGame();
                return;
            }

            moveSnake();
            
            // Se comeu a comida
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                if (score > highscore) {
                    highscore = score;
                    highscoreElement.innerText = highscore;
                    localStorage.setItem("snakeHighScore", highscore);
                }
                generateFood();
            } else {
                snake.pop(); // Remove a cauda se não comeu
            }

            draw();
        }

        // Desenha tudo na tela
        function draw() {
            // Limpa o canvas
            ctx.fillStyle = "rgba(5, 5, 15, 0.3)"; // Efeito de rastro leve
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha a comida (Neon Vermelho/Rosa)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0844";
            ctx.fillStyle = "#ff0844";
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Desenha a Cobrinha (Neon Ciano)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00f2fe";
            snake.forEach((part, index) => {
                // A cabeça é ligeiramente mais clara
                ctx.fillStyle = index === 0 ? "#fff" : "#00f2fe";
                ctx.fillRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);
            });
            
            // Reseta o blur do shadow para não pesar no render
            ctx.shadowBlur = 0;
        }

        // Movimentação
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
        }

        // Verifica colisões
        function hasGameEnded() {
            // Colisão com paredes
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            if (hitLeftWall || hitRightWall || hitToptWall || hitBottomWall) return true;

            // Colisão com o próprio corpo
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        // Gera comida em posição aleatória alinhada ao grid
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Garante que a comida não nasça em cima da cobra
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateFood();
            });
        }

        // Trata os inputs do teclado
        function changeDirection(event) {
            if (!gameRunning) return;

            const keyPressed = event.key.toLowerCase();
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === 'arrowleft' || keyPressed === 'a') && !goingRight) {
                dx = -gridSize;
                dy = 0;
            }
            if ((keyPressed === 'arrowup' || keyPressed === 'w') && !goingDown) {
                dx = 0;
                dy = -gridSize;
            }
            if ((keyPressed === 'arrowright' || keyPressed === 'd') && !goingLeft) {
                dx = gridSize;
                dy = 0;
            }
            if ((keyPressed === 'arrowdown' || keyPressed === 's') && !goingUp) {
                dx = 0;
                dy = gridSize;
            }
        }

        function endGame() {
            clearInterval(gameInterval);
            gameRunning = false;
            gameOverScreen.style.display = "flex";
        }

        // Event Listeners
        document.addEventListener("keydown", changeDirection);
        restartBtn.addEventListener("click", initGame);

        // Iniciar o jogo automaticamente ao carregar
        initGame();
    </script>
</body>
</html>
