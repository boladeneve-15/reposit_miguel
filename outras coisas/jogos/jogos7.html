<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Space Shooter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050510;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 800px;
            max-width: 100%;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            background: linear-gradient(to bottom, #000000, #07071a);
        }
        canvas { display: block; }
        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: 3.5rem;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
            text-align: center;
        }
        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            background: transparent;
            border: 2px solid #ff007f;
            color: #ff007f;
            cursor: pointer;
            text-shadow: 0 0 10px #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
            transition: all 0.3s ease;
        }
        button:hover {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 30px #ff007f;
            transform: scale(1.05);
        }
        .controls {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>PONTOS: <span id="score">0</span></div>
        <div>VIDAS: <span id="lives">3</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="screen-overlay">
            <h1 id="title">CYBER SHOOTER</h1>
            <button id="btn-action">JOGAR</button>
            <div class="controls">Mova com as SETAS (← →) ou A/D. Atire com ESPAÇO.</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");
        const overlay = document.getElementById("screen-overlay");
        const btnAction = document.getElementById("btn-action");
        const titleEl = document.getElementById("title");

        // Configurações do Jogo
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let keys = {};

        // Entidades
        let player;
        let bullets = [];
        let enemies = [];
        let particles = [];

        // Event Listeners para Teclado
        document.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // --- CLASSES DO JOGO ---

        class Player {
            constructor() {
                this.width = 40;
                this.height = 30;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 50;
                this.speed = 7;
                this.cooldown = 0;
            }

            draw() {
                ctx.fillStyle = "#00ffcc";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ffcc";
                
                // Nave em formato de triângulo futurista
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            update() {
                if (keys["arrowleft"] || keys["a"]) this.x -= this.speed;
                if (keys["arrowright"] || keys["d"]) this.x += this.speed;

                // Limites da tela
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                // Sistema de tiro com cooldown
                if (keys[" "] && this.cooldown <= 0) {
                    bullets.push(new Bullet(this.x + this.width / 2, this.y));
                    this.cooldown = 15; // frames entre os tiros
                }
                if (this.cooldown > 0) this.cooldown--;
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x - 2;
                this.y = y;
                this.width = 4;
                this.height = 15;
                this.speed = 9;
            }

            draw() {
                ctx.fillStyle = "#ffff00";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffff00";
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }

            update() {
                this.y -= this.speed;
            }
        }

        class Enemy {
            constructor() {
                this.width = 35;
                this.height = 25;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 2 + Math.random() * 3; // Velocidades variadas
            }

            draw() {
                ctx.fillStyle = "#ff007f";
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ff007f";
                
                // Invasor geométrico
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = "#fff";
                ctx.fillRect(this.x + 5, this.y + 5, 5, 5); // "Olhos"
                ctx.fillRect(this.x + this.width - 10, this.y + 5, 5, 5);
                
                ctx.shadowBlur = 0;
            }

            update() {
                this.y += this.speed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.color = color;
                this.alpha = 1;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02; // Vai sumindo aos poucos
            }
        }

        // --- FUNÇÕES DE SPAWN E EXPLOSÃO ---

        function spawnEnemy() {
            if (!gameActive) return;
            enemies.push(new Enemy());
            // O tempo de spawn diminui conforme os pontos aumentam (fica mais difícil)
            let nextSpawn = Math.max(300, 1000 - score * 5);
            setTimeout(spawnEnemy, nextSpawn);
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // --- CHECAGEM DE COLISÃO (AABB) ---
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // --- LOOP PRINCIPAL DO JOGO ---

        function gameLoop() {
            if (!gameActive) return;

            // Fundo dinâmico com rastro estelar leve
            ctx.fillStyle = "rgba(5, 5, 15, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Atualizar e Desenhar o Player
            player.update();
            player.draw();

            // 2. Atualizar e Desenhar Tiros
            bullets.forEach((bullet, bIndex) => {
                bullet.update();
                bullet.draw();
                // Remove tiros fora da tela
                if (bullet.y < 0) bullets.splice(bIndex, 1);
            });

            // 3. Atualizar e Desenhar Partículas
            particles.forEach((particle, pIndex) => {
                particle.update();
                particle.draw();
                if (particle.alpha <= 0) particles.splice(pIndex, 1);
            });

            // 4. Gerenciar Inimigos e Colisões
            enemies.forEach((enemy, eIndex) => {
                enemy.update();
                enemy.draw();

                // Colisão: Inimigo passa da tela (Perde vida)
                if (enemy.y > canvas.height) {
                    enemies.splice(eIndex, 1);
                    loseLife();
                }

                // Colisão: Inimigo bate no Jogador
                if (checkCollision(player, enemy)) {
                    createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, "#ff007f");
                    createExplosion(player.x + player.width/2, player.y + player.height/2, "#00ffcc");
                    enemies.splice(eIndex, 1);
                    loseLife();
                }

                // Colisão: Tiro acerta Inimigo
                bullets.forEach((bullet, bIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, "#ff007f");
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });

            requestAnimationFrame(gameLoop);
        }

        // --- SISTEMA DE ESTADO DO JOGO ---

        function loseLife() {
            lives--;
            livesEl.innerText = lives;
            if (lives <= 0) {
                gameOver();
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            bullets = [];
            enemies = [];
            particles = [];
            player = new Player();
            
            gameActive = true;
            overlay.style.display = "none";
            
            spawnEnemy();
            gameLoop();
        }

        function gameOver() {
            gameActive = false;
            titleEl.innerText = "FIM DE JOGO";
            titleEl.style.color = "#ff007f";
            titleEl.style.textShadow = "0 0 20px #ff007f";
            btnAction.innerText = "TENTAR DE NOVO";
            overlay.style.display = "flex";
        }

        btnAction.addEventListener("click", startGame);
    </script>
</body>
</html>
