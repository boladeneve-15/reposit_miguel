<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos: Infinite Procedural Odyssey</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #020208;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 5, 20, 0.75);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00f2fe;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .stat-bar {
            width: 120px;
            height: 8px;
            background: #222;
            display: inline-block;
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
        }
        .stat-fill { height: 100%; width: 100%; transition: width 0.1s; }
        #fuel-fill { background: #ffbc00; }
        #shield-fill { background: #00f2fe; }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            color: #667;
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
            background: rgba(2,2,8,0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
        .key { color: #00f2fe; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="color: #00f2fe; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem;">NAV-COMPUTER</div>
        <div>X: <span id="nav-x">0</span> | Y: <span id="nav-y">0</span></div>
        <div>VEL: <span id="nav-vel">0</span> km/h</div>
        <div>COMB: <div class="stat-bar"><div id="fuel-fill" class="stat-fill"></div></div></div>
        <div>ESCUDO: <div class="stat-bar"><div id="shield-fill" class="stat-fill"></div></div></div>
        <div id="alert" style="color: #ff0055; margin-top: 5px; font-weight: bold; min-height: 20px;"></div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <div id="controls-hint">
        Controles: <span class="key">W</span> Acelerar | <span class="key">A/D</span> Rotacionar | <span class="key">S</span> Escudo Espacial
    </div>

    <script>
        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");

        // Ajusta o tamanho do canvas para ocupar a tela cheia de forma nativa
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- SISTEMA DE ENTRADAS ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // --- ENTIDADES DO UNIVERSO ---
        const ship = {
            x: 0, y: 0,
            vx: 0, vy: 0,
            angle: -Math.PI / 2,
            rotationSpeed: 0.05,
            thrust: 0.12,
            friction: 0.992,
            fuel: 100,
            shields: 100,
            radius: 12
        };

        // Geração Procedural Determinística (Sementes matemáticas para criar planetas infinitos)
        const planets = [];
        const numPlanets = 40;
        // Criando planetas espalhados por uma coordenada massiva de até 15.000 pixels
        for(let i=0; i<numPlanets; i++) {
            let angle = (i / numPlanets) * Math.PI * 2 + Math.random() * 0.5;
            let dist = 800 + Math.random() * 6000;
            planets.push({
                x: Math.cos(angle) * dist,
                y: Math.sin(angle) * dist,
                radius: 80 + Math.random() * 150,
                mass: 800 + Math.random() * 2000,
                color: `hsl(${Math.random() * 360}, 75%, 45%)`,
                glowColor: `hsl(${Math.random() * 360}, 80%, 65%)`,
                name: `EXO-${100 + i}`
            });
        }

        // Criando estrelas de fundo infinitas usando paralaxe estático baseado em quadrantes
        const stars = [];
        for(let i=0; i<300; i++) {
            stars.push({
                x: (Math.random() - 0.5) * canvas.width * 4,
                y: (Math.random() - 0.5) * canvas.height * 4,
                size: Math.random() * 2,
                alpha: 0.3 + Math.random() * 0.7
            });
        }

        // Partículas de fumaça e explosão
        let particles = [];
        function createThrusterParticle(x, y, angle) {
            particles.push({
                x: x - Math.cos(angle) * 15,
                y: y - Math.sin(angle) * 15,
                vx: -Math.cos(angle + (Math.random() - 0.5) * 0.4) * (2 + Math.random() * 3) + ship.vx,
                vy: -Math.sin(angle + (Math.random() - 0.5) * 0.4) * (2 + Math.random() * 3) + ship.vy,
                size: Math.random() * 4 + 2,
                color: `rgba(255, ${Math.floor(Math.random()*150 + 50)}, 0, 0.8)`,
                life: 1.0
            });
        }

        // --- SISTEMA DE FÍSICA ORBITAL E LOOP ---
        function update() {
            // 1. Rotação da Nave
            if (keys['a']) ship.angle -= ship.rotationSpeed;
            if (keys['d']) ship.angle += ship.rotationSpeed;

            // 2. Propulsão Elétrica (Thrust)
            let alertBox = document.getElementById("alert");
            alertBox.innerText = "";
            
            if (keys['w'] && ship.fuel > 0) {
                ship.vx += Math.cos(ship.angle) * ship.thrust;
                ship.vy += Math.sin(ship.angle) * ship.thrust;
                ship.fuel = Math.max(0, ship.fuel - 0.15);
                createThrusterParticle(ship.x, ship.y, ship.angle);
            }

            // Ativação do escudo cinético consome energia
            let shieldActive = keys['s'] && ship.shields > 5;
            if (shieldActive) ship.shields = Math.max(0, ship.shields - 0.3);

            // 3. Gravidade de Newton de Múltiplos Corpos ($F = G * \frac{m_1 * m_2}{r^2}$)
            let inGravityField = false;
            planets.forEach(planet => {
                let dx = planet.x - ship.x;
                let dy = planet.y - ship.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                // Se aproximar do raio de influência gravitacional do planeta
                if (distance < planet.radius * 4) {
                    inGravityField = true;
                    // Vetor unitário de força
                    let force = planet.mass / (distance * distance);
                    ship.vx += (dx / distance) * force;
                    ship.vy += (dy / distance) * force;

                    // Alerta de Proximidade Crítica
                    if (distance < planet.radius + 150) {
                        alertBox.innerText = `GRAVIDADE CRÍTICA: ${planet.name.toUpperCase()}`;
                    }
                }

                // Colisão Física com a Superfície Planetária
                if (distance < planet.radius + ship.radius) {
                    let speed = Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy);
                    if (speed > 3 && !shieldActive) {
                        // Impacto destrutivo catastrófico
                        ship.shields = Math.max(0, ship.shields - (speed * 10));
                    }
                    
                    // Empurra a nave de volta (Física de Rebote Elástico)
                    let overlap = (planet.radius + ship.radius) - distance;
                    ship.x -= (dx / distance) * overlap;
                    ship.y -= (dy / distance) * overlap;
                    // Amortece a velocidade
                    ship.vx = -ship.vx * 0.4;
                    ship.vy = -ship.vy * 0.4;
                }
            });

            // Reabastecimento no vácuo se estiver parado próximo a planetas azuis/verdes
            if(!inGravityField && ship.fuel < 100) ship.fuel += 0.02; 
            if(ship.shields < 100 && !shieldActive) ship.shields += 0.05;

            // 4. Aplica Inércia e Atrito Espacial Mínimo
            ship.vx *= ship.friction;
            ship.vy *= ship.friction;
            ship.x += ship.vx;
            ship.y += ship.vy;

            // Atualiza Partículas
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                if(p.life <= 0) particles.splice(index, 1);
            });

            // Atualiza Interface Gráfica (HUD)
            document.getElementById("nav-x").innerText = Math.floor(ship.x);
            document.getElementById("nav-y").innerText = Math.floor(ship.y);
            let currentSpeed = Math.floor(Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy) * 10);
            document.getElementById("nav-vel").innerText = currentSpeed;
            document.getElementById("fuel-fill").style.width = `${ship.fuel}%`;
            document.getElementById("shield-fill").style.width = `${ship.shields}%`;

            if(ship.shields <= 0) {
                alertBox.innerText = "SISTEMA COMPROMETIDO. NAVE DESTRUÍDA.";
                ship.vx = 0; ship.vy = 0;
            }
        }

        // --- ENGINE GRÁFICA (CÂMERA DE SEGUIMENTO E MATRIZ) ---
        function draw() {
            // Limpa com preto absoluto cósmico
            ctx.fillStyle = "#02020a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Transpõe a matriz de renderização para colocar a Câmera focada centralizada na Nave
            // Toda entidade se move relativamente ao centro dinâmico do monitor do jogador!
            ctx.translate(canvas.width / 2 - ship.x, canvas.height / 2 - ship.y);

            // 1. Desenha Estrelas com Efeito Paralaxe Estático
            ctx.fillStyle = "#ffffff";
            stars.forEach(star => {
                // Cálculo de repetição para dar sensação de espaço infinito contínuo
                let sx = star.x + Math.floor(ship.x / 2) * 0.1;
                let sy = star.y + Math.floor(ship.y / 2) * 0.1;
                ctx.globalAlpha = star.alpha;
                ctx.fillRect(sx, sy, star.size, star.size);
            });
            ctx.globalAlpha = 1.0;

            // 2. Desenha Planetas com Atmosfera Volumétrica e Gradientes de Luz
            planets.forEach(planet => {
                // Atmosfera Externa (Glow) usando Gradiente Radial Avançado
                let glow = ctx.createRadialGradient(planet.x, planet.y, planet.radius * 0.9, planet.x, planet.y, planet.radius * 1.4);
                glow.addColorStop(0, planet.glowColor);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius * 1.4, 0, Math.PI * 2);
                ctx.fill();

                // Corpo Sólido do Planeta
                ctx.fillStyle = planet.color;
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fill();

                // Detalhes da Superfície (Aneis ou Sombras Críticas)
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.arc(planet.x + planet.radius*0.2, planet.y + planet.radius*0.2, planet.radius, 0, Math.PI*2);
                ctx.fill();

                // Nome do Planeta flutuando no espaço vetorial
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                ctx.font = "10px monospace";
                ctx.fillText(planet.name, planet.x - 20, planet.y - planet.radius - 10);
            });

            // 3. Desenha Partículas de Fumaça
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // 4. Desenha a Nave (Instanciada no Centro Vetorial)
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            // Campo de Força de Escudo Ativo
            if (keys['s'] && ship.shields > 5) {
                ctx.strokeStyle = "rgba(0, 242, 254, 0.6)";
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00f2fe";
                ctx.beginPath();
                ctx.arc(0, 0, ship.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Design da Nave Interstelar (Vetores geométricos)
            if(ship.shields > 0) {
                ctx.fillStyle = "#ffffff";
                ctx.strokeStyle = "#00f2fe";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(15, 0);       // Nariz
                ctx.lineTo(-10, -10);    // Asa Esquerda
                ctx.lineTo(-5, 0);       // Propulsor Central
                ctx.lineTo(-10, 10);     // Asa Direita
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            } else {
                // Desenha destroços se destruída
                ctx.fillStyle = "#444";
                ctx.fillRect(-5, -5, 8, 8);
            }

            ctx.restore(); // Restaura rotação da nave
            ctx.restore(); // Restaura translação da câmera
        }

        // Loop de Alta Performance Sincronizado
        function run() {
            update();
            draw();
            requestAnimationFrame(run);
        }
        run();
    </script>
</body>
</html>
