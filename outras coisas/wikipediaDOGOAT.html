       <button onclick="maimin()">Resultado</button>

<script>
    // juntando strings
    function juntar(){
     a = nome1.value
    
    b = nome2.value
    juntaR.innerHTML = a+" "+b
    }
function maimin(){
    mai = maiusculo.value
    min = minusculo.value
    MAIM = mai.toUpperCase()
    MINM = min.toLowerCase()
 maiR.innerHTML = MAIM
 minR.innerHTML = MINM
}
