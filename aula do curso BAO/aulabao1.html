</body>
<script>
function Frases(){
    A = input.value
    mai = A.slice(1).toLowerCase()
    min = A.slice(0,1).toUpperCase()

    atividade2.innerHTML = min + mai
}




    function R(){
        A = Digi.value
rr = A.length;
 RR.innerHTML = rr
    }

    function MAIUCUSLO(){
 B = MAI.value
 ff = B.toLowerCase()
 mm.innerHTML = ff
    }
    function replaceA(){
        s = PG.value
        ss = s.replace( "hetero" , "gay")
            pg.innerHTML = ss
        
    }
    function cortar(){
NOME = nome.value
NUMERO = numero.value
N = (NOME.slice(-NUMERO))
RE.innerHTML = N
    }

    function cut(){
        n = nome.value
        nu = numero.value

        posicaoCorte = n.length - nu

        sub = n.slice(posicaoCorte, nu)

        RE.innerHTML = sub
    }
