<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      button{
    background: linear-gradient(270deg, #314a57, #57c785, #a8a114);
    background-size: 600% 600%;
    animation: gradientMove 5s ease infinite;
    transition: transform 0.3s;
    border: 0;
    margin: 40px;
    width: 150px;
    height: 75px;
    border-radius: 30px;
}

button:hover{
    transform: scale(1.05);
}

@keyframes gradientMove {
    0%{ background-position: 25% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 25% 50%; }
}
    
  body{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;

    background: linear-gradient(270deg, #2A7B9B, #57C785, #EDDD53);
    background-size: 600% 600%;

    animation: fundoAnimado 8s ease infinite; 
}
@media screen and (max-width: 768px) {
  body {
    display: grid;
    grid-template-columns: 1fr 1fr; /* 2 colunas */
    gap: 15px;
    justify-items: center;
    align-items: center;
  }

  button {
    width: 100%;
    height: 60px;
    margin: 0;
  }
}
button:focus {
    transform: scale(1.05); 
}
 

 </style>
</head>
<body>
    <button onclick="soma()">fazer conta de soma </button>
    <button onclick="subitraimento()">fazer conta de subtração</button>
    <button onclick="vezes()">fazer conta de multiplicação</button>
    <button onclick="divizao()">fazer conta de divisão</button>
</body>
<script>

    function soma(){
      a =  prompt( "escolha um numero (se nao tiver nada nao vai funcionar)")
      a = parseInt(a)
    b = prompt( "escolha outro numero (se nao tiver nada nao vai funcionar)")
     b = parseInt (b)
      alert(a+b)
    }
    function subitraimento(){
      c =  prompt( "escolha um numero (se nao tiver nada nao vai funcionar)")
      c = parseInt(c)
      d= prompt( "escolha outro numero (se nao tiver nada nao vai funcionar)")
     d = parseInt (d)
      alert(c-d)
    }
    function vezes(){
      e =  prompt( "escolha um numero ( se nao tiver nada nao vai funcionar)")
      e = parseInt(e)
    f = prompt( "escolha outro numero (se nao tiver nada nao vai funcionar)")
     f = parseInt (f)
      alert (e*f)
    }
    function divizao(){
      g =  prompt( "escolha um numero (se nao tiver nada nao vai funcionar)")
      g = parseInt(g)
    h = prompt( "escolha outro numero (se nao tiver nada nao vai funcionar)")
     h = parseInt (h)
      alert(g/h)
    }
</script>
</html>
